<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#041108" />
  <title>Matrix Notes Mobile</title>
  <style>
    :root {
      --bg: #020503;
      --panel: rgba(7, 20, 12, 0.52);
      --panel-2: rgba(9, 26, 15, 0.62);
      --border: rgba(85, 255, 130, 0.16);
      --text: #c7ffd5;
      --text-dim: #73af83;
      --accent: #4dff85;
      --shadow: 0 0 10px rgba(77, 255, 133, 0.1), 0 0 30px rgba(77, 255, 133, 0.03);
      --radius: 18px;
      --font-main: "Courier New", "Lucida Console", monospace;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: var(--font-main);
      background: radial-gradient(circle at top, rgba(20, 80, 35, 0.16), transparent 35%), linear-gradient(180deg, #010201 0%, #020503 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 2px, transparent 4px);
      opacity: 0.12;
      mix-blend-mode: screen;
    }

    .rain {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.1;
      z-index: 0;
    }

    .rain span {
      position: absolute;
      top: -20%;
      color: var(--accent);
      font-size: 11px;
      white-space: pre;
      animation: fall linear infinite;
      text-shadow: 0 0 6px rgba(77,255,133,0.3);
      user-select: none;
    }

    @keyframes fall {
      from { transform: translateY(-15vh); }
      to { transform: translateY(120vh); }
    }

    .boot {
      position: fixed;
      inset: 0;
      background: #010201;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 18px;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }
    .boot.hidden { opacity: 0; visibility: hidden; }
    .boot-box {
      width: 100%;
      max-width: 480px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(6,18,10,0.96), rgba(5,12,8,0.98));
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .boot-title {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 1.4px;
    }
    .boot-log {
      min-height: 140px;
      line-height: 1.7;
      font-size: 13px;
      color: var(--text-dim);
      white-space: pre-wrap;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: calc(14px + var(--safe-top)) 14px calc(18px + var(--safe-bottom));
      display: grid;
      gap: 12px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .header {
      padding: 16px;
      display: grid;
      gap: 8px;
    }
    .header h1 {
      margin: 0;
      font-size: 22px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.4px;
      text-shadow: 0 0 8px rgba(77,255,133,0.3);
    }
    .meta, .muted, .tiny {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.6;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 0 10px 10px;
    }
    .tab-btn, button, .fake-btn, select, input {
      font: inherit;
    }
    .tab-btn, button, .fake-btn {
      border: 1px solid rgba(77,255,133,0.22);
      background: linear-gradient(180deg, rgba(12,42,20,0.95), rgba(6,20,10,0.95));
      color: var(--accent);
      padding: 8px 10px;
      border-radius: 12px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      min-height: 36px;
    }
    .tab-btn.active {
      border-color: rgba(77,255,133,0.5);
      box-shadow: 0 0 14px rgba(77,255,133,0.12);
    }

    .section { display: none; }
    .section.active { display: block; }
    .body { padding: 10px; display: grid; gap: 8px; }

    input, select {
      width: 100%;
      background: rgba(2, 10, 4, 0.92);
      color: var(--text);
      border: 1px solid rgba(77,255,133,0.18);
      border-radius: 12px;
      padding: 9px 11px;
      outline: none;
      box-shadow: inset 0 0 10px rgba(77,255,133,0.04);
      min-height: 36px;
    }
    input::placeholder { color: #588467; }

    .stack { display: grid; gap: 6px; }
    .row { display: grid; gap: 3px; }

    .list-card, .item, .stat-card, .pinned-card, .work-shell {
      padding: 8px;
      min-height: 58vh;
      display: grid;
      align-content: start;
      gap: 8px;
    }
    .list-card, .stat-card, .pinned-card { padding: 7px 9px; min-height: auto; gap: 4px; }
    .list-card.active { border-color: rgba(77,255,133,0.42); box-shadow: 0 0 14px rgba(77,255,133,0.12); }

    .work-shell {
      padding: 14px;
      min-height: 58vh;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .prompt-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: center;
      border: 1px solid rgba(77,255,133,0.14);
      border-radius: 12px;
      background: rgba(4, 12, 7, 0.34);
      padding: 7px 10px;
    }

    .prompt-marker {
      color: var(--accent);
      font-size: 18px;
      line-height: 1;
      text-shadow: 0 0 8px rgba(77,255,133,0.25);
      animation: blinkPrompt 1.1s steps(1) infinite;
    }

    @keyframes blinkPrompt {
      0%, 55% { opacity: 1; }
      56%, 100% { opacity: 0.35; }
    }

    .prompt-input {
      border: 0;
      background: transparent;
      padding: 0;
      border-radius: 0;
      box-shadow: none;
      min-height: auto;
      color: var(--text);
      font-size: 14px;
    }
    .prompt-input:focus { border: 0; box-shadow: none; }

    .item-list {
      display: grid;
      gap: 5px;
      align-content: start;
    }

    .item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      padding: 7px 9px;
      min-height: auto;
    }
    .item.done { opacity: 0.82; background: rgba(6, 12, 8, 0.18); }

    .checkbox {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 1px solid rgba(77,255,133,0.5);
      background: rgba(1, 8, 3, 0.95);
      margin-top: 2px;
      position: relative;
    }
    .checkbox:checked::after {
      content: "✓";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 13px;
    }

    .item-text {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.32;
      font-size: 14px;
    }
    .item.done .item-text {
      text-decoration: line-through;
      color: #6e8f77;
    }

    .actions, .quick-grid, .list-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .actions {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.18s ease, opacity 0.18s ease;
    }

    .item.show-actions .actions {
      max-height: 60px;
      opacity: 1;
    }

    .list-actions {
      margin-top: 6px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .icon-btn {
      border: 1px solid rgba(77,255,133,0.16);
      background: rgba(5, 18, 8, 0.86);
      color: var(--text-dim);
      border-radius: 10px;
      padding: 5px 8px;
      min-height: 28px;
    }

    .item-tools-btn {
      border: 1px solid rgba(77,255,133,0.16);
      background: rgba(5, 18, 8, 0.66);
      color: var(--text-dim);
      border-radius: 10px;
      padding: 3px 7px;
      min-height: 24px;
      margin-top: 4px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .stat-value {
      margin-top: 3px;
      font-size: 16px;
      color: var(--text);
    }

    .empty {
      padding: 12px;
      text-align: center;
      border: 1px dashed rgba(77,255,133,0.18);
      border-radius: 16px;
      color: var(--text-dim);
      background: rgba(7, 20, 11, 0.10);
    }

    .sheet-title {
      font-size: 13px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .footer {
      text-align: center;
      color: #50795d;
      font-size: 11px;
      padding: 4px 0 10px;
    }
  </style>
</head>
<body>
  <div class="boot" id="bootScreen">
    <div class="boot-box">
      <h2 class="boot-title">Matrix Mobile // Boot</h2>
      <div class="boot-log" id="bootLog"></div>
    </div>
  </div>

  <div class="rain" id="rain"></div>

  <div class="app">
    <section class="panel header">
      <h1>Matrix Notes Mobile</h1>
      <div class="meta">minimal iPhone checklist console</div>
      <div class="meta" id="clockLine">---</div>
      <div class="meta" id="statusLine">system ready</div>
    </section>

    <section class="panel">
      <div class="tabs">
        <button class="tab-btn active" data-tab="work">Work</button>
        <button class="tab-btn" data-tab="lists">Lists</button>
        <button class="tab-btn" data-tab="tools">Tools</button>
      </div>
    </section>

    <section class="section active" id="tab-work">
      <div class="panel body">
        <div class="work-shell" id="workShell"></div>
      </div>
    </section>

    <section class="section" id="tab-lists">
      <div class="panel body stack">
        <div class="sheet-title">Create New List</div>
        <form id="newListForm" class="stack">
          <input id="newListTitle" type="text" maxlength="80" placeholder="e.g.Plato's Cave" />
          <button type="submit">Add List</button>
        </form>
        <input id="listSearch" type="text" placeholder="search lists..." />
        <div class="stack" id="listStack"></div>
      </div>
    </section>

    <section class="section" id="tab-tools">
      <div class="panel body stack">
        <div class="sheet-title">Stats</div>
        <div class="stats" id="statsGrid"></div>

        <div class="sheet-title">Backup</div>
        <div class="quick-grid">
          <button id="exportBtn">Export</button>
          <label class="fake-btn" for="importInput">Import</label>
          <input id="importInput" type="file" accept="application/json" hidden />
          <button id="undoGlobalBtn">Undo</button>
        </div>

        <div class="sheet-title">Pinned</div>
        <div class="stack" id="pinnedPanel"></div>
      </div>
    </section>

    <div class="footer">local iPhone web app • add to home screen in Safari</div>
  </div>

  <script>
    const STORAGE_KEY = 'matrix_notes_mobile_minimal_v1';
    const MAX_HISTORY = 40;

    const seedData = {
      lists: [
        {
          id: crypto.randomUUID(),
          title: 'To Do List',
          pinned: true,
          createdAt: Date.now() - 300000,
          items: [
            { id: crypto.randomUUID(), text: 'Wake up, Neo', done: false, createdAt: Date.now() - 250000 },
            { id: crypto.randomUUID(), text: 'Follow the white rabbit', done: false, createdAt: Date.now() - 210000 }
          ]
        },
        {
          id: crypto.randomUUID(),
          title: 'Red Pill',
          pinned: false,
          createdAt: Date.now() - 220000,
          items: [
            { id: crypto.randomUUID(), text: 'Set top 3 signals', done: false, createdAt: Date.now() - 180000 },
            { id: crypto.randomUUID(), text: 'Exercise', done: false, createdAt: Date.now() - 150000 },
            { id: crypto.randomUUID(), text: 'Meditate', done: false, createdAt: Date.now() - 120000 }
          ]
        }
      ],
      activeListId: null,
      ui: {
        listQuery: '',
        undoStack: [],
        activeTab: 'work'
      }
    };

    let state = loadState();
    normalizeState();

    const bootScreen = document.getElementById('bootScreen');
    const bootLog = document.getElementById('bootLog');
    const rain = document.getElementById('rain');
    const workShell = document.getElementById('workShell');
    const listStack = document.getElementById('listStack');
    const statsGrid = document.getElementById('statsGrid');
    const pinnedPanel = document.getElementById('pinnedPanel');
    const clockLine = document.getElementById('clockLine');
    const statusLine = document.getElementById('statusLine');
    const newListForm = document.getElementById('newListForm');
    const newListTitle = document.getElementById('newListTitle');
    const listSearch = document.getElementById('listSearch');
    const exportBtn = document.getElementById('exportBtn');
    const importInput = document.getElementById('importInput');
    const undoGlobalBtn = document.getElementById('undoGlobalBtn');

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(seedData);
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.lists)) return structuredClone(seedData);
        return parsed;
      } catch {
        return structuredClone(seedData);
      }
    }

    function normalizeState() {
      if (!state || !Array.isArray(state.lists)) state = structuredClone(seedData);
      if (!state.ui) state.ui = structuredClone(seedData.ui);
      if (!Array.isArray(state.ui.undoStack)) state.ui.undoStack = [];
      if (!state.ui.activeTab) state.ui.activeTab = 'work';
      state.lists = state.lists.map(list => ({ ...list, pinned: Boolean(list.pinned) }));
      if (!state.activeListId && state.lists.length) state.activeListId = state.lists[0].id;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      statusLine.textContent = 'sync complete • ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function snapshot() {
      return JSON.stringify({
        lists: state.lists,
        activeListId: state.activeListId,
        ui: {
          ...state.ui,
          undoStack: []
        }
      });
    }

    function rememberState() {
      state.ui.undoStack.push(snapshot());
      if (state.ui.undoStack.length > MAX_HISTORY) state.ui.undoStack = state.ui.undoStack.slice(-MAX_HISTORY);
    }

    function performUndo() {
      if (!state.ui.undoStack.length) {
        saveState();
        render();
        return;
      }
      const previous = JSON.parse(state.ui.undoStack.pop());
      const remaining = [...state.ui.undoStack];
      state = previous;
      normalizeState();
      state.ui.undoStack = remaining;
      saveState();
      render();
    }

    function mutate(fn) {
      rememberState();
      fn();
      saveState();
      render();
    }

    function getActiveList() {
      return state.lists.find(list => list.id === state.activeListId) || null;
    }

    function fmtDate(ts) {
      return new Date(ts).toLocaleString([], { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function updateClock() {
      const now = new Date();
      clockLine.textContent = now.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' }) + ' • ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function createRain() {
      const glyphs = '01アイウエオカキクケコサシスセソABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const count = Math.min(20, Math.floor(window.innerWidth / 22));
      rain.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const span = document.createElement('span');
        let text = '';
        const length = 12 + Math.floor(Math.random() * 16);
        for (let j = 0; j < length; j++) text += glyphs[Math.floor(Math.random() * glyphs.length)] + '\n';
        span.textContent = text;
        span.style.left = `${Math.random() * 100}%`;
        span.style.animationDuration = `${7 + Math.random() * 10}s`;
        span.style.animationDelay = `${Math.random() * -12}s`;
        rain.appendChild(span);
      }
    }

    function runBoot() {
      const lines = [
        '>> Initializing Matrix Mobile...',
        '>> Mounting local storage...',
        '>> Enabling touch interface...',
        '>> Minimal checklist mode online...',
        '>> System ready.'
      ];
      let i = 0;
      bootLog.textContent = '';
      const timer = setInterval(() => {
        bootLog.textContent += lines[i] + '\n';
        i += 1;
        if (i >= lines.length) {
          clearInterval(timer);
          setTimeout(() => bootScreen.classList.add('hidden'), 380);
        }
      }, 220);
    }

    function filteredLists() {
      const sorted = [...state.lists].sort((a, b) => {
        if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
        return b.createdAt - a.createdAt;
      });
      const q = state.ui.listQuery.trim().toLowerCase();
      if (!q) return sorted;
      return sorted.filter(list => list.title.toLowerCase().includes(q));
    }

    function renderTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === state.ui.activeTab);
      });
      document.querySelectorAll('.section').forEach(section => {
        section.classList.toggle('active', section.id === `tab-${state.ui.activeTab}`);
      });
    }

    function renderLists() {
      const lists = filteredLists();
      listStack.innerHTML = lists.length ? lists.map(list => {
        const done = list.items.filter(item => item.done).length;
        return `
          <div class="list-card ${list.id === state.activeListId ? 'active' : ''}" data-list-id="${list.id}">
            <div class="row"><strong>${escapeHtml(list.title)}</strong><div class="tiny">${done}/${list.items.length} • ${new Date(list.createdAt).toLocaleDateString([], { month: 'short', day: 'numeric' })}</div></div>
            <div class="list-actions">
              <button class="icon-btn list-pin-btn" type="button">${list.pinned ? 'Unpin' : 'Pin'}</button>
              <button class="icon-btn list-edit-btn" type="button">Edit</button>
              <button class="icon-btn list-delete-btn" type="button">Delete</button>
            </div>
          </div>
        `;
      }).join('') : '<div class="empty">No matching lists found.</div>';

      document.querySelectorAll('.list-card').forEach(card => {
        const listId = card.dataset.listId;
        card.addEventListener('click', (event) => {
          if (event.target.closest('.list-actions')) return;
          state.activeListId = listId;
          state.ui.activeTab = 'work';
          saveState();
          render();
        });
        card.querySelector('.list-pin-btn').addEventListener('click', () => toggleListPin(listId));
        card.querySelector('.list-edit-btn').addEventListener('click', () => editList(listId));
        card.querySelector('.list-delete-btn').addEventListener('click', () => deleteList(listId));
      });
    }

    function renderStats() {
      const allItems = state.lists.flatMap(list => list.items);
      statsGrid.innerHTML = `
        <div class="stat-card"><div class="stat-label">Lists</div><div class="stat-value">${state.lists.length}</div></div>
        <div class="stat-card"><div class="stat-label">Open</div><div class="stat-value">${allItems.filter(i => !i.done).length}</div></div>
        <div class="stat-card"><div class="stat-label">Done</div><div class="stat-value">${allItems.filter(i => i.done).length}</div></div>
        <div class="stat-card"><div class="stat-label">Undo</div><div class="stat-value">${state.ui.undoStack.length}</div></div>
      `;

      const pinned = allItems.filter(i => !i.done).slice(0, 6);
      pinnedPanel.innerHTML = pinned.length ? pinned.map(item => `
        <div class="pinned-card">
          <div>${escapeHtml(item.text)}</div>
          <div class="tiny">${item.done ? 'done' : 'open'}</div>
        </div>
      `).join('') : '<div class="empty">Nothing to show.</div>';
    }

    function renderWork() {
      const active = getActiveList();
      if (!active) {
        workShell.innerHTML = '<div class="empty">Create a list first.</div>';
        return;
      }

      const items = [...active.items].sort((a, b) => {
        if (a.done !== b.done) return a.done ? 1 : -1;
        return b.createdAt - a.createdAt;
      });
      workShell.innerHTML = `
        <div class="sheet-title">${escapeHtml(active.title)}</div>
        <div class="muted">${active.items.length} entries • ${active.items.filter(i => i.done).length} done</div>

        <form id="promptForm" class="prompt-row">
          <div class="prompt-marker">&gt;</div>
          <input id="promptInput" class="prompt-input" type="text" placeholder="type item and press enter" autocomplete="off" />
        </form>

        <div class="item-list" id="itemList">
          ${items.length ? items.map(item => `
            <article class="item ${item.done ? 'done' : ''}" data-item-id="${item.id}">
              <input class="checkbox" type="checkbox" ${item.done ? 'checked' : ''} />
              <div>
                <div class="item-text">${escapeHtml(item.text)}</div>
                <button class="item-tools-btn" type="button">•••</button>
                <div class="actions" style="margin-top:4px;">
                  <div class="tiny">${fmtDate(item.createdAt)}</div>
                  <button class="icon-btn edit-btn" type="button">Edit</button>
                  <button class="icon-btn delete-btn" type="button">Delete</button>
                </div>
              </div>
            </article>
          `).join('') : '<div class="empty">Blank workspace. Start typing above.</div>'}
        </div>
      `;

      document.getElementById('promptForm').addEventListener('submit', addPromptItem);
      document.querySelectorAll('.item').forEach(itemEl => {
        const itemId = itemEl.dataset.itemId;
        itemEl.querySelector('.checkbox').addEventListener('change', () => toggleItem(itemId));
        itemEl.querySelector('.item-tools-btn').addEventListener('click', () => {
          document.querySelectorAll('.item').forEach(el => {
            if (el !== itemEl) el.classList.remove('show-actions');
          });
          itemEl.classList.toggle('show-actions');
        });
        itemEl.querySelector('.edit-btn').addEventListener('click', () => editItem(itemId));
        itemEl.querySelector('.delete-btn').addEventListener('click', () => deleteItem(itemId));
      });
    }

    function render() {
      renderTabs();
      renderLists();
      renderStats();
      renderWork();
    }

    function addList(event) {
      event.preventDefault();
      const title = newListTitle.value.trim();
      if (!title) return;
      mutate(() => {
        const list = { id: crypto.randomUUID(), title, pinned: false, createdAt: Date.now(), items: [] };
        state.lists.unshift(list);
        state.activeListId = list.id;
        newListTitle.value = '';
        state.ui.activeTab = 'work';
      });
    }

    function toggleListPin(listId) {
      const list = state.lists.find(l => l.id === listId);
      if (!list) return;
      mutate(() => { list.pinned = !list.pinned; });
    }

    function editList(listId) {
      const list = state.lists.find(l => l.id === listId);
      if (!list) return;
      const next = prompt('Edit list name:', list.title);
      if (next === null) return;
      const cleaned = next.trim();
      if (!cleaned) return;
      mutate(() => { list.title = cleaned; });
    }

    function deleteList(listId) {
      const list = state.lists.find(l => l.id === listId);
      if (!list) return;
      const ok = confirm(`Delete list: ${list.title}?`);
      if (!ok) return;
      mutate(() => {
        state.lists = state.lists.filter(l => l.id !== listId);
        if (state.activeListId === listId) state.activeListId = state.lists[0]?.id || null;
      });
    }

    function addPromptItem(event) {
      event.preventDefault();
      const active = getActiveList();
      if (!active) return;
      const input = document.getElementById('promptInput');
      const text = input.value.trim();
      if (!text) return;
      mutate(() => {
        active.items.unshift({ id: crypto.randomUUID(), text, done: false, createdAt: Date.now() });
        input.value = '';
      });
      document.getElementById('promptInput')?.focus();
    }

    function toggleItem(itemId) {
      const active = getActiveList();
      if (!active) return;
      const item = active.items.find(i => i.id === itemId);
      if (!item) return;
      mutate(() => { item.done = !item.done; });
    }

    function editItem(itemId) {
      const active = getActiveList();
      if (!active) return;
      const item = active.items.find(i => i.id === itemId);
      if (!item) return;
      const next = prompt('Edit item:', item.text);
      if (next === null) return;
      const cleaned = next.trim();
      if (!cleaned) return;
      mutate(() => { item.text = cleaned; });
    }

    function deleteItem(itemId) {
      const active = getActiveList();
      if (!active) return;
      mutate(() => { active.items = active.items.filter(i => i.id !== itemId); });
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `matrix-notes-mobile-backup-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const parsed = JSON.parse(e.target.result);
          if (!parsed || !Array.isArray(parsed.lists)) throw new Error('Invalid backup file');
          state = parsed;
          normalizeState();
          saveState();
          render();
          alert('Import successful.');
        } catch {
          alert('Import failed. Use a valid Matrix Notes backup JSON.');
        } finally {
          importInput.value = '';
        }
      };
      reader.readAsText(file);
    }

    newListForm.addEventListener('submit', addList);
    listSearch.value = state.ui.listQuery || '';
    listSearch.addEventListener('input', e => {
      state.ui.listQuery = e.target.value;
      saveState();
      renderLists();
    });

    exportBtn.addEventListener('click', exportData);
    importInput.addEventListener('change', importData);
    undoGlobalBtn.addEventListener('click', () => performUndo());

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.ui.activeTab = btn.dataset.tab;
        saveState();
        renderTabs();
      });
    });

    document.addEventListener('keydown', e => {
      const activeTag = document.activeElement?.tagName;
      const typing = activeTag === 'INPUT' || activeTag === 'SELECT';

      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
        e.preventDefault();
        performUndo();
        return;
      }

      if (e.key === '/' && !typing) {
        e.preventDefault();
        state.ui.activeTab = 'work';
        saveState();
        render();
        document.getElementById('promptInput')?.focus();
      }
    });

    updateClock();
    setInterval(updateClock, 1000);
    createRain();
    window.addEventListener('resize', createRain);
    runBoot();
    render();
  </script>
</body>
</html>
